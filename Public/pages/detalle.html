<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- base -->
    <link rel="stylesheet" href="../assets/css/base/variables.css">
    <link rel="stylesheet" href="../assets/css/base/reset.css">
    <link rel="stylesheet" href="../assets/css/base/layout.css">
    <!-- components -->
    <link rel="stylesheet" href="../assets/css/components/glass.css">
    <link rel="stylesheet" href="../assets/css/components/avatar.css">
    <link rel="stylesheet" href="../assets/css/components/badges.css">
    <link rel="stylesheet" href="../assets/css/components/forms.css">
    <link rel="stylesheet" href="../assets/css/components/tabla.css">
    <link rel="stylesheet" href="../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../assets/css/components/loader.css">
    <!-- page -->
    <link rel="stylesheet" href="../assets/css/pages/detalle.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>DashBoard — Detalle</title>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="loader-container"></div>

    <main class="page-content">

        <div class="page-header">
            <a id="btn-volver" href="personas.html" class="btn-volver">
                <i data-lucide="arrow-left"></i>
                <span id="volver-label">Volver</span>
            </a>
        </div>

        <!-- Cabecera de la persona -->
        <div class="persona-header">
            <div class="persona-avatar"></div>
            <div class="persona-info">
                <h1 class="persona-nombre"></h1>
                <p class="persona-descripcion"></p>
            </div>
            <div class="saldo-badge">
                <span class="saldo-label">Saldo pendiente</span>
                <span class="saldo-monto"></span>
            </div>
        </div>

        <!-- Resumen rápido — IDs requeridos por detalle.js -->
        <div class="resumen-grid">
            <div class="resumen-card">
                <span class="resumen-label">Total fiado</span>
                <span class="resumen-valor fiado" id="rv-fiado">—</span>
            </div>
            <div class="resumen-card">
                <span class="resumen-label">Total pagado</span>
                <span class="resumen-valor pago" id="rv-pago">—</span>
            </div>
            <div class="resumen-card">
                <span class="resumen-label">Movimientos</span>
                <span class="resumen-valor neutro" id="rv-movs">—</span>
            </div>
            <div class="resumen-card spark-card">
                <span class="resumen-label">Actividad (12 sem.)</span>
                <div class="spark-bars" id="spark-actividad"></div>
            </div>
        </div>

        <!-- Tabla de movimientos -->
        <div class="movimientos-wrapper">
            <div class="movimientos-header">
                <h2 class="movimientos-titulo">Movimientos</h2>
                <div class="mov-controles">
                    <div class="mov-filtros">
                        <button class="mov-chip activo" data-tipo="todos">Todos</button>
                        <button class="mov-chip" data-tipo="FIADO">Fiados</button>
                        <button class="mov-chip" data-tipo="PAGO">Pagos</button>
                    </div>
                    <span class="movimientos-count" id="movimientos-count"></span>
                </div>
            </div>

            <div class="tabla-scroll">
                <table class="tabla-movimientos">
                    <thead>
                        <tr>
                            <th>Tipo</th>
                            <th>Monto</th>
                            <th>Fecha</th>
                            <th>Nota</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="../assets/js/helper/init.js"></script>
    <script src="../assets/js/helper/utils.js"></script>
    <script src="../assets/js/service/api.js"></script>
    <script src="../assets/js/pages/detalle.js"></script>
</body>
</html>
