<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- base -->
    <link rel="stylesheet" href="../assets/css/base/variables.css">
    <link rel="stylesheet" href="../assets/css/base/reset.css">
    <link rel="stylesheet" href="../assets/css/base/layout.css">
    <!-- components -->
    <link rel="stylesheet" href="../assets/css/components/glass.css">
    <link rel="stylesheet" href="../assets/css/components/badges.css">
    <link rel="stylesheet" href="../assets/css/components/forms.css">
    <link rel="stylesheet" href="../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../assets/css/components/loader.css">

    <link rel="stylesheet" href="../assets/css/pages/catalogo.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>DashBoard-Catalogo</title>
</head>
<body>
    <!-- SideBar-->
    <div id="sidebar-container"></div>
    <div id="loader-container"></div>
     <main class="page-content">
 
        <div class="page-header">
            <h1 class="page-title">Catálogo</h1>
            <p class="page-subtitle">Consulta los productos por categoría</p>
        </div>
 
        <div class="catalogo-wrapper">
 
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="buscador" placeholder="Buscar producto..." />
            </div>
 
            <div class="tabs-container" id="tabs-container"></div>
 
            <div class="productos-grid" id="productos-grid"></div>
 
        </div>
 
    </main>
<script src="../assets/js/helper/init.js"></script>
