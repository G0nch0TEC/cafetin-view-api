<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- base -->
    <link rel="stylesheet" href="../assets/css/base/variables.css">
    <link rel="stylesheet" href="../assets/css/base/reset.css">
    <link rel="stylesheet" href="../assets/css/base/layout.css">
    <!-- components -->
    <link rel="stylesheet" href="../assets/css/components/glass.css">
    <link rel="stylesheet" href="../assets/css/components/avatar.css">
    <link rel="stylesheet" href="../assets/css/components/badges.css">
    <link rel="stylesheet" href="../assets/css/components/forms.css">
    <link rel="stylesheet" href="../assets/css/components/tabla.css">
    <link rel="stylesheet" href="../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../assets/css/components/loader.css">
    <!-- page -->
    <link rel="stylesheet" href="../assets/css/pages/historial.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>DashBoard — Historial</title>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="loader-container"></div>

    <main class="page-content">

        <div class="page-header">
            <div>
                <h1 class="page-title">Historial</h1>
                <p class="page-subtitle">Movimientos por día</p>
            </div>
            <div class="date-nav">
                <button class="date-nav-btn" id="btn-anterior" title="Día anterior">
                    <i data-lucide="chevron-left"></i>
                </button>
                <div class="date-picker-wrap">
                    <i data-lucide="calendar" class="date-icon"></i>
                    <input type="date" id="fecha-selector" />
                </div>
                <button class="date-nav-btn" id="btn-siguiente" title="Día siguiente">
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Resumen del día — el JS actualiza los valores -->
        <div class="resumen-dia">
            <div class="resumen-card">
                <span class="resumen-label">Total fiado</span>
                <span class="resumen-valor fiado" id="val-fiado">—</span>
            </div>
            <div class="resumen-card">
                <span class="resumen-label">Total pagado</span>
                <span class="resumen-valor pago" id="val-pago">—</span>
            </div>
            <div class="resumen-card">
                <span class="resumen-label">Diferencia</span>
                <span class="resumen-valor deuda" id="val-diferencia">—</span>
            </div>
            <div class="resumen-card donut-card">
                <span class="resumen-label">Proporción</span>
                <div class="donut-wrap">
                    <svg class="donut-svg" id="donut-svg" viewBox="0 0 40 40">
                        <circle class="donut-bg" cx="20" cy="20" r="15" fill="none" stroke-width="5"/>
                        <circle class="donut-fiado" id="donut-fiado" cx="20" cy="20" r="15" fill="none" stroke-width="5"
                            stroke-dasharray="0 94.25" stroke-dashoffset="23.56" stroke-linecap="round"/>
                        <circle class="donut-pago" id="donut-pago" cx="20" cy="20" r="15" fill="none" stroke-width="5"
                            stroke-dasharray="0 94.25" stroke-dashoffset="23.56" stroke-linecap="round"/>
                    </svg>
                    <span class="donut-label" id="donut-label">—</span>
                </div>
            </div>
        </div>

        <!-- Controles de filtro -->
        <div class="filtros-bar">
            <div class="filtros-chips">
                <button class="filtro-chip activo" data-tipo="todos">Todos</button>
                <button class="filtro-chip" data-tipo="FIADO">Solo fiados</button>
                <button class="filtro-chip" data-tipo="PAGO">Solo pagos</button>
                <button class="filtro-chip" data-orden="monto-desc">Mayor monto</button>
                <button class="filtro-chip" data-orden="monto-asc">Menor monto</button>
            </div>
            <div class="filtros-acciones">
                <div class="hist-search-wrap">
                    <i data-lucide="search" class="hist-search-icon"></i>
                    <input type="text" id="buscador-hist" placeholder="Buscar persona…" />
                </div>
                <button class="btn-exportar" id="btn-exportar" title="Exportar CSV">
                    <i data-lucide="download"></i>
                    <span>CSV</span>
                </button>
            </div>
        </div>

        <!-- Tabla — el JS rellena tbody, título y contador -->
        <div class="movimientos-wrapper">
            <div class="movimientos-header">
                <h2 class="movimientos-titulo"></h2>
                <span class="movimientos-count"></span>
            </div>

            <div class="tabla-scroll">
                <table class="tabla-movimientos">
                    <thead>
                        <tr>
                            <th>Persona</th>
                            <th>Tipo</th>
                            <th>Monto</th>
                            <th>Hora</th>
                            <th>Nota</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                    <tfoot id="tabla-tfoot"></tfoot>
                </table>
            </div>
        </div>

    </main>

    <script src="../assets/js/helper/init.js"></script>
    <script src="../assets/js/helper/utils.js"></script>
    <script src="../assets/js/service/api.js"></script>
    <script src="../assets/js/pages/historial.js"></script>
</body>
</html>
