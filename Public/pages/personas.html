<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/pages/personas.css">
    <link rel="stylesheet" href="../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../assets/css/components/loader.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>DashBoard — Clientes</title>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="loader-container"></div>

    <main class="page-content">

        <!-- Header con resumen mejorado -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Clientes</h1>
                <p class="page-subtitle" id="header-resumen">Cargando...</p>
            </div>
            <div class="header-meta">
                <span class="total-badge" id="total-badge"></span>
            </div>
        </div>

        <!-- Buscador + Filtros -->
        <div class="toolbar">
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="buscador" placeholder="Buscar persona..." />
            </div>
            <div class="filtros">
                <button class="filtro-btn activo" data-filtro="todos">Todos</button>
                <button class="filtro-btn" data-filtro="deuda">Con deuda</button>
                <button class="filtro-btn" data-filtro="al-dia">Al día</button>
                <button class="filtro-btn" data-filtro="sin-mov">Sin movimiento</button>
            </div>
            <div class="orden-wrap">
                <select id="orden-select">
                    <option value="nombre">Nombre A–Z</option>
                    <option value="mayor-deuda">Mayor deuda</option>
                    <option value="reciente">Más reciente</option>
                    <option value="inactivo">Más inactivo</option>
                </select>
            </div>
        </div>

        <!-- Lista -->
        <div class="personas-lista" id="persona-lista"></div>

    </main>

    <script src="../assets/js/components/init.js"></script>
    <script src="../assets/js/components/api.js"></script>
    <script src="../assets/js/components/utils.js"></script>
    <script src="../assets/js/pages/personas.js"></script>
</body>
</html>
