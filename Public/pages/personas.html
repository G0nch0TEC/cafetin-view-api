<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/pages/personas.css">
    <link rel="stylesheet" href="../assets/css/components/sidebar.css">
    <link rel="stylesheet" href="../assets/css/components/loader.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>DashBoard — Clientes</title>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="loader-container"></div>

    <main class="page-content">

        <div class="page-header">
            <div>
                <h1 class="page-title">Clientes</h1>
                <p class="page-subtitle">Personas registradas en el cafetín</p>
            </div>
            <div class="header-meta">
                <span class="total-badge"></span>
            </div>
        </div>

        <!-- Buscador -->
        <div class="search-box">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="buscador" placeholder="Buscar persona..." />
        </div>

        <!-- Lista — el JS la rellena -->
        <div class="personas-lista" id="persona-lista"></div>

    </main>

    <script src="../assets/js/init.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/pages/personas.js"></script>
</body>
</html>
