<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- base -->
    <link rel="stylesheet" href="assets/css/base/variables.css">
    <link rel="stylesheet" href="assets/css/base/reset.css">
    <link rel="stylesheet" href="assets/css/base/layout.css">
    <!-- components -->
    <link rel="stylesheet" href="assets/css/components/glass.css">
    <link rel="stylesheet" href="assets/css/components/avatar.css">
    <link rel="stylesheet" href="assets/css/components/badges.css">
    <link rel="stylesheet" href="assets/css/components/sidebar.css">
    <link rel="stylesheet" href="assets/css/components/loader.css">
    <!-- page -->
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>DashBoard — Inicio</title>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="loader-container"></div>

    <main class="page-content">

        <!-- Saludo -->
        <div class="page-header">
            <div>
                <h1 class="page-title"></h1>
                <p class="page-subtitle"></p>
            </div>
        </div>

        <!-- Slider de insights -->
        <div class="insights-slider">
            <div class="insights-track" id="insights-track"></div>
            <div class="insights-dots" id="insights-dots"></div>
        </div>

        <!-- Métricas principales -->
        <div class="metricas-grid">

            <div class="metrica-card deuda">
                <div class="metrica-icon"><i data-lucide="trending-up"></i></div>
                <div class="metrica-body">
                    <span class="metrica-label">Deuda total</span>
                    <span class="metrica-valor"></span>
                    <span class="metrica-sub"></span>
                </div>
                <svg class="metrica-spark" id="spark-deuda" viewBox="0 0 60 20" preserveAspectRatio="none"></svg>
            </div>

            <div class="metrica-card pago">
                <div class="metrica-icon"><i data-lucide="wallet"></i></div>
                <div class="metrica-body">
                    <span class="metrica-label">Cobrado hoy</span>
                    <span class="metrica-valor"></span>
                    <span class="metrica-sub"></span>
                </div>
                <svg class="metrica-spark" id="spark-cobrado" viewBox="0 0 60 20" preserveAspectRatio="none"></svg>
            </div>

            <div class="metrica-card fiado">
                <div class="metrica-icon"><i data-lucide="receipt"></i></div>
                <div class="metrica-body">
                    <span class="metrica-label">Fiado hoy</span>
                    <span class="metrica-valor"></span>
                    <span class="metrica-sub"></span>
                </div>
                <svg class="metrica-spark" id="spark-fiado" viewBox="0 0 60 20" preserveAspectRatio="none"></svg>
            </div>

            <div class="metrica-card neutro">
                <div class="metrica-icon"><i data-lucide="users"></i></div>
                <div class="metrica-body">
                    <span class="metrica-label">Personas</span>
                    <span class="metrica-valor"></span>
                    <span class="metrica-sub"></span>
                </div>
                <svg class="metrica-spark" id="spark-personas" viewBox="0 0 60 20" preserveAspectRatio="none"></svg>
            </div>

        </div>

        <!-- Indicador de frescura de datos -->
        <div class="data-freshness" id="data-freshness">
            <i data-lucide="clock"></i>
            <span id="freshness-text">Cargando datos...</span>
        </div>

        <!-- Gráfico últimos 7 días -->
        <div class="panel semana-chart-panel">
            <div class="panel-header">
                <h2 class="panel-titulo">Cobrado vs Fiado — últimos 7 días</h2>
                <div class="chart-legend">
                    <span class="legend-dot cobrado"></span><span>Cobrado</span>
                    <span class="legend-dot fiado"></span><span>Fiado</span>
                </div>
            </div>
            <div class="semana-chart-wrap">
                <div class="semana-chart" id="semana-chart"></div>
            </div>
        </div>

        <!-- Fila inferior: últimos movimientos + accesos rápidos -->
        <div class="bottom-grid">

        <!-- IZQUIERDA — dos paneles apilados -->
        <div class="left-col">

        <div class="panel movimientos-recientes">
            <div class="panel-header">
                <h2 class="panel-titulo">Movimientos de hoy</h2>
                <a href="pages/historial.html" class="panel-link">
                Ver historial <i data-lucide="arrow-right"></i>
                </a>
            </div>
            <div class="mov-lista" id="mov-lista"></div>
        </div>

        <div class="panel ranking-panel">
            <div class="panel-header">
                <h2 class="panel-titulo">Más pedidos hoy</h2>
                <a href="pages/catalogo.html" class="panel-link">
                    Ver catálogo <i data-lucide="arrow-right"></i>
                </a>
            </div>
            <div class="ranking-lista" id="ranking-lista"></div>
        </div>

        </div><!-- /left-col -->

        <!-- DERECHA -->
        <div class="right-col">
        <div class="panel deudores">
            <div class="panel-header">
                <h2 class="panel-titulo">Mayores deudas</h2>
                <a href="pages/personas.html" class="panel-link">
                    Ver todos <i data-lucide="arrow-right"></i>
                </a>
            </div>
            <div class="deudores-lista" id="deudores-lista"></div>
            </div>

            <div class="accesos-grid">
            <a href="pages/personas.html" class="acceso-card">
                <i data-lucide="users"></i>
                <span>Clientes</span>
            </a>
            <a href="pages/historial.html" class="acceso-card">
                <i data-lucide="bar-chart-2"></i>
                <span>Historial</span>
            </a>
            <a href="pages/catalogo.html" class="acceso-card">
                <i data-lucide="shopping-bag"></i>
                <span>Catálogo</span>
            </a>
            </div>
        </div>
    </div>

    </main>

    <script src="assets/js/service/api.js"></script>
    <script src="assets/js/helper/init.js"></script>
    <script src="assets/js/helper/utils.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
